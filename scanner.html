<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Ler QR Code | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
      </aside>
      <main class="content">
        <a class="back-link" href="index.html" aria-label="Voltar para o início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 19 8 12l7-7"></path></svg>
          Voltar
        </a>
        <header class="page-head">
          <div>
            <h1>Ler QR Code</h1>
            <p id="scan-status">Preparando câmera...</p>
          </div>
        </header>
        <div class="grid-2">
          <section class="panel">
            <div class="scanner-frame">
              <video id="camera" playsinline muted></video>
              <div class="scan-corner tl"></div>
              <div class="scan-corner tr"></div>
              <div class="scan-corner bl"></div>
              <div class="scan-corner br"></div>
              <div class="scan-line"></div>
            </div>
          </section>
          <section class="panel">
            <h2>Entrada manual</h2>
            <form id="manual-form" class="form">
              <label class="field">
                <span>Código do posto</span>
                <input id="manual-code" class="input" placeholder="Ex.: P003" maxlength="4" required>
              </label>
              <button class="button" type="submit">Abrir posto</button>
            </form>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="js/scanner.js"></script>
  </body>
</html>
