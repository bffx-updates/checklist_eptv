<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0B0F1D">
    <title>Chamado | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
        <nav class="nav">
          <a href="index.html">Início</a>
          <a href="scanner.html">Ler QR Code</a>
          <a href="historico.html">Histórico</a>
          <a href="senha.html">Alterar senha</a>
          <a href="configuracoes.html" data-supervisor-only>Configurações</a>
        </nav>
        <div class="sidebar__bottom"><button class="danger-button" data-logout>Sair</button></div>
      </aside>
      <main class="content">
        <header class="page-head">
          <div>
            <h1 id="posto-title">Chamado</h1>
            <p id="posto-city"></p>
          </div>
        </header>

        <form id="chamado-form" class="form">
          <section class="panel">
            <h2>Ocorrência</h2>
            <div class="form">
              <label class="field">
                <span>Motivo da ocorrência</span>
                <textarea name="motivo" required></textarea>
              </label>
              <label class="field">
                <span>Solução aplicada</span>
                <textarea name="solucao" required></textarea>
              </label>
            </div>
          </section>
          <section class="panel">
            <h2>Status para o supervisor</h2>
            <div class="form">
              <div class="status-picker" aria-label="Status para o supervisor">
                <label class="status-choice status-choice--green">
                  <input required type="radio" name="supervisorStatus" value="verde">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Verde</strong>
                </label>
                <label class="status-choice status-choice--yellow">
                  <input type="radio" name="supervisorStatus" value="amarelo">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Amarelo</strong>
                </label>
                <label class="status-choice status-choice--red">
                  <input type="radio" name="supervisorStatus" value="vermelho">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Vermelho</strong>
                </label>
              </div>
              <label class="field">
                <span>Descrição para o supervisor</span>
                <textarea name="supervisorDescricao" required></textarea>
              </label>
            </div>
          </section>
          <button class="button" type="submit">Salvar chamado</button>
        </form>
      </main>
    </div>
    <script type="module" src="js/chamado.js"></script>
  </body>
</html>
