<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Posto | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
      </aside>
      <main class="content">
        <a class="back-link" href="index.html" aria-label="Voltar para o início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 19 8 12l7-7"></path></svg>
          Voltar
        </a>
        <div class="empty-state" hidden>Posto não encontrado.</div>
        <section class="posto-view" hidden>
          <section class="posto-hero">
            <div class="posto-hero__label">Posto identificado</div>
            <div class="posto-hero__name"><span id="posto-codigo"></span><strong id="posto-nome"></strong></div>
            <div class="posto-hero__pills" id="posto-pills"></div>
          </section>

          <h2 class="section-title">O que você vai fazer aqui?</h2>
          <div class="action-list">
            <a id="start-preventiva" class="action-tile action-tile--primary" href="#">
              <span class="action-tile__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11.5 11.5 14 16 9"></path><rect x="4" y="4" width="16" height="16" rx="4"></rect></svg>
              </span>
              <span class="action-tile__text"><strong>Preventiva</strong><small>Checklist completo · 10 itens</small></span>
            </a>
            <a id="start-chamado" class="action-tile" href="#">
              <span class="action-tile__icon action-tile__icon--warn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8v5M12 16.5v.01"></path><path d="M10.3 3.8 2.9 17a2 2 0 0 0 1.7 3h14.8a2 2 0 0 0 1.7-3L13.7 3.8a2 2 0 0 0-3.4 0Z"></path></svg>
              </span>
              <span class="action-tile__text"><strong>Chamado</strong><small>Registrar ocorrência e solução</small></span>
            </a>
            <a class="secondary-button" href="scanner.html">Ler outro QR Code</a>
          </div>

          <section class="panel">
            <h2>Histórico do posto</h2>
            <div id="posto-history" class="visit-list"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="js/posto.js"></script>
  </body>
</html>
