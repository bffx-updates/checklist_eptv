<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0B0F1D">
    <title>Posto | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
        <nav class="nav">
          <a href="index.html">Início</a>
          <a href="scanner.html">Ler QR Code</a>
          <a href="historico.html">Histórico</a>
          <a href="senha.html">Alterar senha</a>
          <a href="configuracoes.html" data-supervisor-only>Configurações</a>
        </nav>
        <div class="sidebar__bottom"><button class="danger-button" data-logout>Sair</button></div>
      </aside>
      <main class="content">
        <div class="empty-state" hidden>Posto não encontrado.</div>
        <section class="posto-view" hidden>
          <header class="page-head">
            <div>
              <h1><span id="posto-codigo"></span> - <span id="posto-nome"></span></h1>
              <p>Posto identificado. Confira o histórico antes de iniciar o registro.</p>
            </div>
          </header>
          <div class="panel">
            <dl class="meta-grid">
              <div><dt>Código</dt><dd id="posto-codigo-meta"></dd></div>
              <div><dt>Status</dt><dd id="posto-status"></dd></div>
              <div><dt>Cidade</dt><dd id="posto-cidade-meta"></dd></div>
              <div><dt>Endereço</dt><dd id="posto-endereco"></dd></div>
            </dl>
          </div>
          <section class="panel">
            <h2>Ações</h2>
            <div class="button-grid button-grid--three">
              <a id="start-chamado" class="button" href="#">Chamado</a>
              <a id="start-preventiva" class="secondary-button" href="#">Preventiva</a>
              <a class="secondary-button" href="scanner.html">Ler outro QR Code</a>
            </div>
          </section>
          <section class="panel">
            <h2>Histórico do posto</h2>
            <div id="posto-history" class="visit-list"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="js/posto.js"></script>
  </body>
</html>
