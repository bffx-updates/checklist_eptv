<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Preventiva | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="app-page checklist-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
      </aside>
      <main class="content">
        <!-- Assistente: um item por vez -->
        <section id="wizard-screen">
          <div class="wiz-top">
            <button id="wiz-back" class="icon-button" type="button" aria-label="Voltar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19 8 12l7-7"></path></svg>
            </button>
            <div class="wiz-top__title">Item <span id="wiz-idx">1</span> de <span id="wiz-total">10</span></div>
            <a class="wiz-exit" href="index.html">Sair</a>
          </div>
          <div class="wiz-dots" id="wiz-dots"></div>
          <div class="wiz-stage" id="wiz-stage">
            <div class="wiz-icon" id="wiz-icon"></div>
            <div class="wiz-rack" id="wiz-rack" hidden></div>
            <h1 class="wiz-label" id="wiz-label"></h1>
            <p class="wiz-hint">Como está este item?</p>
            <input id="wiz-obs" class="input wiz-obs" placeholder="Observação do item (opcional)">
          </div>
          <div class="wiz-actions" id="wiz-actions"></div>
        </section>

        <!-- Tela final: fotos, GPS, observações e status -->
        <form id="checklist-form" class="form" hidden>
          <div class="wiz-top">
            <button id="finish-back" class="icon-button" type="button" aria-label="Voltar ao checklist">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19 8 12l7-7"></path></svg>
            </button>
            <div class="wiz-top__title" id="posto-title">Finalizar visita</div>
          </div>
          <p id="posto-city" class="home-sub"></p>
          <div id="checklist-summary" class="checklist-summary"></div>

          <section class="panel">
            <h2>Fotos</h2>
            <label class="field">
              <span>Adicionar imagens</span>
              <input id="fotos" class="input" type="file" accept="image/*" capture="environment" multiple>
            </label>
            <div id="photo-preview" class="photo-preview"></div>
          </section>
          <section class="panel">
            <h2>Observações</h2>
            <label class="field">
              <span>Observações gerais</span>
              <textarea name="observacoes"></textarea>
            </label>
          </section>
          <section class="panel">
            <h2>Como o posto fica depois da visita?</h2>
            <div class="form">
              <div class="status-picker" aria-label="Status para o supervisor">
                <label class="status-choice status-choice--green">
                  <input required type="radio" name="supervisorStatus" value="verde">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Verde</strong>
                </label>
                <label class="status-choice status-choice--yellow">
                  <input type="radio" name="supervisorStatus" value="amarelo">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Amarelo</strong>
                </label>
                <label class="status-choice status-choice--red">
                  <input type="radio" name="supervisorStatus" value="vermelho">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Vermelho</strong>
                </label>
              </div>
              <label class="field">
                <span>Descrição para o supervisor (opcional)</span>
                <textarea name="supervisorDescricao"></textarea>
              </label>
            </div>
          </section>
          <button class="button" type="submit">Concluir visita</button>
        </form>
      </main>
    </div>

    <div class="modal" id="share-modal" hidden>
      <div class="modal__card">
        <div class="modal__icon">📋</div>
        <h2 class="modal__title">Checklist na memória</h2>
        <p class="modal__text">Copiei o checklist. Abra o WhatsApp e <strong>cole no grupo RTX</strong>.</p>
        <pre class="modal__preview" id="share-preview"></pre>
        <div class="modal__actions">
          <a class="button" id="share-open" href="#" target="_blank" rel="noopener">Abrir WhatsApp</a>
          <button class="secondary-button" type="button" id="share-copy">Copiar de novo</button>
          <button class="secondary-button" type="button" id="share-done">Pronto</button>
        </div>
      </div>
    </div>
    <script type="module" src="js/checklist.js"></script>
  </body>
</html>
