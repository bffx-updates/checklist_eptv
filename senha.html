<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Alterar senha | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
      </aside>
      <main class="content">
        <a class="back-link" href="index.html" aria-label="Voltar para o início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 19 8 12l7-7"></path></svg>
          Voltar
        </a>
        <header class="page-head">
          <div>
            <h1>Alterar senha</h1>
            <p id="password-note"></p>
          </div>
        </header>

        <section class="panel">
          <form id="password-form" class="form">
            <label class="field">
              <span>Senha atual</span>
              <input class="input" name="currentPassword" type="password" autocomplete="current-password" required>
            </label>
            <label class="field">
              <span>Nova senha</span>
              <input class="input" name="newPassword" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label class="field">
              <span>Confirmar nova senha</span>
              <input class="input" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <button class="button" type="submit">Salvar nova senha</button>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="js/senha.js"></script>
  </body>
</html>
