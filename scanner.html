<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0B0F1D">
    <title>Ler QR Code | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
        <nav class="nav">
          <a href="index.html">Início</a>
          <a href="scanner.html" aria-current="page">Ler QR Code</a>
          <a href="historico.html">Histórico</a>
          <a href="senha.html">Alterar senha</a>
          <a href="configuracoes.html" data-supervisor-only>Configurações</a>
        </nav>
        <div class="sidebar__bottom"><button class="danger-button" data-logout>Sair</button></div>
      </aside>
      <main class="content">
        <header class="page-head">
          <div>
            <h1>Ler QR Code</h1>
            <p id="scan-status">Preparando câmera...</p>
          </div>
        </header>
        <div class="grid-2">
          <section class="panel">
            <div class="scanner-frame">
              <video id="camera" playsinline muted></video>
              <div class="scan-corner tl"></div>
              <div class="scan-corner tr"></div>
              <div class="scan-corner bl"></div>
              <div class="scan-corner br"></div>
              <div class="scan-line"></div>
            </div>
          </section>
          <section class="panel">
            <h2>Entrada manual</h2>
            <form id="manual-form" class="form">
              <label class="field">
                <span>Código do posto</span>
                <input id="manual-code" class="input" placeholder="Ex.: P003" maxlength="4" required>
              </label>
              <button class="button" type="submit">Abrir posto</button>
            </form>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="js/scanner.js"></script>
  </body>
</html>
