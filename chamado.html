<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#FFF9F1">
    <title>Chamado | Inspeção Técnica</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><strong>Inspeção Técnica</strong><span>Retransmissão</span></div>
        <div class="user-chip"><strong data-user-name></strong><span data-user-role></span></div>
      </aside>
      <main class="content">
        <a class="back-link" id="chamado-back" href="posto.html" aria-label="Voltar para as opções do posto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 19 8 12l7-7"></path></svg>
          Voltar
        </a>
        <header class="page-head">
          <div>
            <h1 id="posto-title">Chamado</h1>
            <p id="posto-city"></p>
          </div>
        </header>

        <form id="chamado-form" class="form">
          <section class="panel">
            <h2>Ocorrência</h2>
            <div class="form">
              <label class="field">
                <span>Motivo da ocorrência</span>
                <textarea name="motivo" required></textarea>
              </label>
              <label class="field">
                <span>Solução aplicada</span>
                <textarea name="solucao" required></textarea>
              </label>
            </div>
          </section>
          <section class="panel">
            <h2>Status para o supervisor</h2>
            <div class="form">
              <div class="status-picker" aria-label="Status para o supervisor">
                <label class="status-choice status-choice--green">
                  <input required type="radio" name="supervisorStatus" value="verde">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Verde</strong>
                </label>
                <label class="status-choice status-choice--yellow">
                  <input type="radio" name="supervisorStatus" value="amarelo">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Amarelo</strong>
                </label>
                <label class="status-choice status-choice--red">
                  <input type="radio" name="supervisorStatus" value="vermelho">
                  <span class="status-icon" aria-hidden="true"></span>
                  <strong>Vermelho</strong>
                </label>
              </div>
              <label class="field">
                <span>Descrição para o supervisor</span>
                <textarea name="supervisorDescricao" required></textarea>
              </label>
            </div>
          </section>
          <button class="button" type="submit">Salvar chamado</button>
        </form>
      </main>
    </div>
    <script type="module" src="js/chamado.js"></script>
  </body>
</html>
